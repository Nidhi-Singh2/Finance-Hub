<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<meta name="theme-color" content="#f4f1ea" />
<title>Finance Hub</title>
<meta name="description" content="A curated daily briefing of the most important developments in finance." />
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E%F0%9F%93%88%3C/text%3E%3C/svg%3E" />
<style>
  :root {
    --bg: #f4f1ea;
    --surface: #ffffff;
    --surface-2: #faf7f0;
    --border: #ebe6dc;
    --border-strong: #d9d2c2;
    --text: #1a2e2a;
    --text-dim: #5e6e6a;
    --text-faint: #8a9591;
    --accent: #1f4d44;
    --accent-2: #2a6b5e;
    --accent-light: #c5dfd6;
    --critical: #c44b5e;
    --warn: #d49434;
    --info: #4a7da8;

    --p-mint: #d8ebe2;
    --p-cream: #efe4d3;
    --p-sage: #d6e6d8;
    --p-sand: #ebe1cf;
    --p-sky: #d8e4ef;
    --p-blush: #ecdcd9;
    --p-lilac: #e1ddec;
    --p-peach: #f0dcc8;
    --p-lemon: #ece6c9;

    --radius: 18px;
    --radius-sm: 12px;
    --radius-lg: 24px;
    --shadow: 0 1px 2px rgba(0,0,0,.04), 0 4px 12px rgba(26,46,42,.06);
    --shadow-lg: 0 2px 4px rgba(0,0,0,.04), 0 8px 24px rgba(26,46,42,.08);
    --maxw: 440px;
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Inter", "Segoe UI", Roboto, "Helvetica Neue", sans-serif;
    background: var(--bg);
    color: var(--text);
    -webkit-font-smoothing: antialiased;
    line-height: 1.45;
    padding-bottom: calc(78px + env(safe-area-inset-bottom));
    overscroll-behavior-y: none;
  }
  a { color: var(--accent); text-decoration: none; }
  button { font-family: inherit; cursor: pointer; border: none; background: none; color: inherit; }

  .topbar {
    max-width: var(--maxw);
    margin: 0 auto;
    padding: calc(14px + env(safe-area-inset-top)) 20px 8px;
    display: flex;
    align-items: center;
  }
  .topbar h1 {
    font-size: 28px;
    font-weight: 700;
    letter-spacing: -0.02em;
    margin: 0;
  }
  .topbar .icons {
    margin-left: auto;
    display: flex;
    gap: 14px;
    align-items: center;
  }
  .icon-btn {
    width: 36px; height: 36px;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    color: var(--text);
    position: relative;
  }
  .icon-btn:hover { background: var(--surface); }
  .icon-btn .badge {
    position: absolute;
    top: 4px; right: 6px;
    width: 8px; height: 8px;
    background: var(--critical);
    border-radius: 50%;
    border: 2px solid var(--bg);
  }
  .avatar {
    width: 32px; height: 32px;
    border-radius: 50%;
    background: linear-gradient(135deg, #c5dfd6, #a8c8be);
    display: flex; align-items: center; justify-content: center;
    font-size: 12px; font-weight: 600;
    color: var(--accent);
  }

  .shortcuts {
    max-width: var(--maxw);
    margin: 12px auto 0;
    padding: 0 20px 4px;
    display: flex;
    gap: 10px;
    overflow-x: auto;
    scrollbar-width: none;
    -webkit-overflow-scrolling: touch;
    scroll-snap-type: x proximity;
  }
  .shortcuts::-webkit-scrollbar { display: none; }
  .shortcut {
    flex: 0 0 auto;
    width: 68px;
    text-align: center;
    scroll-snap-align: start;
  }
  .shortcut .tile {
    width: 56px; height: 56px;
    border-radius: var(--radius-sm);
    display: flex; align-items: center; justify-content: center;
    font-size: 24px;
    margin: 0 auto 6px;
    transition: transform .15s ease;
  }
  .shortcut:hover .tile { transform: scale(1.05); }
  .shortcut.active .tile {
    box-shadow: 0 0 0 2px var(--accent);
  }
  .shortcut .label {
    font-size: 10px;
    font-weight: 500;
    color: var(--text-dim);
    line-height: 1.2;
    display: block;
  }
  .shortcut.add .tile {
    background: var(--text);
    color: white;
  }

  main {
    max-width: var(--maxw);
    margin: 0 auto;
    padding: 16px 20px 0;
  }

  .hero {
    background: var(--surface);
    border-radius: var(--radius);
    padding: 18px 18px 16px;
    box-shadow: var(--shadow);
    margin-bottom: 16px;
  }
  .hero-head {
    display: flex;
    align-items: center;
    gap: 6px;
    margin-bottom: 4px;
  }
  .hero-head .label {
    font-size: 14px;
    font-weight: 600;
    color: var(--text);
  }
  .hero-head .chev { color: var(--text-faint); font-size: 14px; }
  .hero-head .live {
    margin-left: auto;
    font-size: 10px;
    font-weight: 600;
    color: var(--accent);
    background: var(--accent-light);
    padding: 3px 8px;
    border-radius: 999px;
    text-transform: uppercase;
    letter-spacing: 0.05em;
  }
  .hero h2 {
    font-size: 30px;
    font-weight: 700;
    letter-spacing: -0.02em;
    margin: 4px 0 2px;
    color: var(--text);
  }
  .hero .sublabel {
    font-size: 13px;
    color: var(--text-dim);
    margin-bottom: 14px;
  }
  .kpi-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
  }
  .kpi {
    background: var(--surface-2);
    border-radius: var(--radius-sm);
    padding: 12px;
    min-height: 78px;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
  }
  .kpi .name {
    font-size: 11px;
    font-weight: 600;
    color: var(--text);
    text-transform: uppercase;
    letter-spacing: 0.04em;
    line-height: 1.2;
  }
  .kpi .val {
    font-size: 18px;
    font-weight: 700;
    color: var(--text);
    letter-spacing: -0.01em;
    margin-top: 4px;
  }
  .kpi .delta {
    font-size: 11px;
    font-weight: 600;
    margin-top: 4px;
  }
  .kpi .delta.up   { color: #1f7a5a; }
  .kpi .delta.down { color: #c44b5e; }
  .kpi .delta.flat { color: var(--text-faint); }

  .actions {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr 1fr;
    gap: 8px;
    margin-bottom: 24px;
  }
  .action { text-align: center; }
  .action .circle {
    width: 56px; height: 56px;
    border-radius: 50%;
    background: var(--accent);
    color: white;
    display: flex; align-items: center; justify-content: center;
    margin: 0 auto 8px;
    font-size: 22px;
    font-weight: 600;
    transition: transform .15s ease, background .15s ease;
  }
  .action.outline .circle {
    background: var(--surface);
    color: var(--accent);
    border: 1.5px solid var(--accent);
  }
  .action:hover .circle { transform: scale(1.05); }
  .action.active .circle {
    background: var(--text);
    color: white;
    border-color: var(--text);
  }
  .action .lbl {
    font-size: 12px;
    font-weight: 500;
    color: var(--text);
  }

  .section-head {
    display: flex;
    align-items: baseline;
    margin: 0 0 12px;
  }
  .section-head h3 {
    font-size: 20px;
    font-weight: 700;
    margin: 0;
    letter-spacing: -0.01em;
  }
  .section-head .see-all {
    margin-left: auto;
    font-size: 13px;
    font-weight: 500;
    color: var(--accent);
  }

  .voices {
    display: flex;
    gap: 10px;
    overflow-x: auto;
    scrollbar-width: none;
    -webkit-overflow-scrolling: touch;
    margin: 0 -20px 24px;
    padding: 4px 20px 8px;
  }
  .voices::-webkit-scrollbar { display: none; }
  .voice {
    flex: 0 0 220px;
    background: var(--surface);
    border-radius: var(--radius);
    padding: 14px;
    box-shadow: var(--shadow);
    display: flex;
    flex-direction: column;
    transition: transform .15s ease;
  }
  .voice:hover { transform: translateY(-2px); }
  .voice-top {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 10px;
  }
  .voice-avatar {
    width: 40px; height: 40px;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 14px;
    font-weight: 700;
    color: var(--accent);
    flex-shrink: 0;
  }
  .voice-meta { min-width: 0; flex: 1; }
  .voice-name {
    font-size: 13px;
    font-weight: 600;
    color: var(--text);
    line-height: 1.2;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .voice-role {
    font-size: 11px;
    color: var(--text-faint);
    line-height: 1.2;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .voice-quote {
    font-size: 13px;
    color: var(--text);
    line-height: 1.4;
    margin: 0 0 10px;
    display: -webkit-box;
    -webkit-line-clamp: 4;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }
  .voice-source {
    font-size: 11px;
    color: var(--text-faint);
    margin-top: auto;
  }

  .feed-card {
    background: var(--surface);
    border-radius: var(--radius);
    box-shadow: var(--shadow);
    overflow: hidden;
    margin-bottom: 16px;
  }
  .date-header {
    padding: 14px 16px 6px;
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--text-faint);
    border-bottom: 1px solid var(--border);
  }
  .date-header .day {
    color: var(--text);
    font-weight: 700;
    text-transform: none;
    font-size: 14px;
    letter-spacing: -0.01em;
    margin-right: 6px;
  }

  .item {
    display: flex;
    align-items: flex-start;
    gap: 12px;
    padding: 12px 14px;
    border-bottom: 1px solid var(--border);
    position: relative;
  }
  .item:last-child { border-bottom: none; }
  .item.pinned {
    background: linear-gradient(to right, rgba(197,223,214,.35), transparent 60%);
  }
  .item-icon {
    width: 40px; height: 40px;
    border-radius: var(--radius-sm);
    display: flex; align-items: center; justify-content: center;
    font-size: 18px;
    flex-shrink: 0;
    margin-top: 2px;
  }
  .item-body { flex: 1; min-width: 0; }
  .item-title-row {
    display: flex;
    align-items: flex-start;
    gap: 8px;
    margin-bottom: 2px;
  }
  .item-title {
    font-size: 14px;
    font-weight: 600;
    color: var(--text);
    line-height: 1.35;
    flex: 1;
    min-width: 0;
  }
  .item-title a { color: inherit; }
  .item-title a:hover { color: var(--accent); }
  .imp {
    font-size: 12px;
    flex-shrink: 0;
    margin-top: 1px;
  }
  .item-summary {
    font-size: 12.5px;
    color: var(--text-dim);
    line-height: 1.4;
    margin: 4px 0 6px;
  }
  .item-meta {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 11px;
    color: var(--text-faint);
  }
  .item-meta .topic-tag {
    font-weight: 600;
    color: var(--accent);
  }
  .item-meta .dot { color: var(--text-faint); }
  .item-actions {
    display: flex;
    flex-direction: column;
    gap: 4px;
    margin-left: 4px;
  }
  .a-btn {
    width: 28px; height: 28px;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 14px;
    color: var(--text-faint);
    transition: all .15s ease;
  }
  .a-btn:hover {
    background: var(--surface-2);
    color: var(--text);
  }
  .a-btn.on { color: var(--accent); }
  .a-btn.pin.on { color: #d49434; }

  .empty {
    text-align: center;
    padding: 50px 20px;
    color: var(--text-faint);
    font-size: 14px;
  }
  .empty .big { font-size: 36px; margin-bottom: 10px; display: block; }

  .tabbar {
    position: fixed;
    bottom: 0; left: 0; right: 0;
    background: rgba(255,255,255,.92);
    backdrop-filter: saturate(160%) blur(14px);
    -webkit-backdrop-filter: saturate(160%) blur(14px);
    border-top: 1px solid var(--border);
    padding: 8px 0 calc(8px + env(safe-area-inset-bottom));
    z-index: 50;
  }
  .tabbar-inner {
    max-width: var(--maxw);
    margin: 0 auto;
    display: grid;
    grid-template-columns: repeat(5, 1fr);
  }
  .tab {
    text-align: center;
    padding: 6px 4px;
    color: var(--text-faint);
    transition: color .15s ease;
  }
  .tab .ti {
    font-size: 18px;
    margin-bottom: 2px;
    display: block;
  }
  .tab .tlbl {
    font-size: 10px;
    font-weight: 500;
  }
  .tab.active { color: var(--accent); }

  @media (max-width: 380px) {
    .topbar h1 { font-size: 24px; }
    .hero h2 { font-size: 26px; }
    .kpi .val { font-size: 16px; }
    .kpi .name { font-size: 10px; }
    .voice { flex: 0 0 200px; }
  }
</style>
</head>

const IMP = { critical: "🔥", high: "⚡", normal: "📌" };
const TOPIC_BG = TOPICS.reduce((m,t) => (m[t.key] = t.bg, m), {});
const TOPIC_ICON = TOPICS.reduce((m,t) => (m[t.key] = t.icon, m), {});

const LS_PIN = "fp.pinned";
const LS_BOOK = "fp.bookmarks";

function lsGet(key) {
  try { return JSON.parse(localStorage.getItem(key) || "[]"); }
  catch (e) { return []; }
}
function lsSet(key, arr) {
  try { localStorage.setItem(key, JSON.stringify(arr)); } catch (e) {}
}

const state = {
  view: "home",
  topic: null,
  pinned: new Set(lsGet(LS_PIN)),
  bookmarks: new Set(lsGet(LS_BOOK)),
};

function togglePin(id) {
  if (state.pinned.has(id)) state.pinned.delete(id);
  else state.pinned.add(id);
  lsSet(LS_PIN, [...state.pinned]);
  renderFeed();
}
function toggleBook(id) {
  if (state.bookmarks.has(id)) state.bookmarks.delete(id);
  else state.bookmarks.add(id);
  lsSet(LS_BOOK, [...state.bookmarks]);
  renderFeed();
}

function fmtDate(iso) {
  const d = new Date(iso + "T12:00:00");
  return d.toLocaleDateString("en-US", { weekday: "long", month: "long", day: "numeric" });
}
function shortDay(iso) {
  const d = new Date(iso + "T12:00:00");
  return d.toLocaleDateString("en-US", { weekday: "short" });
}

function renderShortcuts() {
  const wrap = document.getElementById("shortcuts");
  wrap.innerHTML = "";
  TOPICS.forEach(t => {
    const el = document.createElement("button");
    el.className = "shortcut" + (state.topic === t.key ? " active" : "");
    el.innerHTML = `
      <div class="tile" style="background:${t.bg}">${t.icon}</div>
      <span class="label">${t.key.split(" ")[0]}</span>
    `;
    el.addEventListener("click", () => {
      state.topic = state.topic === t.key ? null : t.key;
      state.view = "home";
      renderAll();
    });
    wrap.appendChild(el);
  });
  const add = document.createElement("button");
  add.className = "shortcut add";
  add.innerHTML = `<div class="tile">+</div><span class="label">All</span>`;
  add.addEventListener("click", () => {
    state.topic = null;
    state.view = "home";
    renderAll();
  });
  wrap.appendChild(add);
}

function renderKPIs() {
  const grid = document.getElementById("kpi-grid");
  grid.innerHTML = "";
  KPIS.forEach(k => {
    const el = document.createElement("div");
    el.className = "kpi";
    const arrow = k.dir === "up" ? "▲" : k.dir === "down" ? "▼" : "—";
    el.innerHTML = `
      <div>
        <div class="name">${k.name}</div>
        <div class="val">${k.val}</div>
      </div>
      <div class="delta ${k.dir}">${arrow} ${k.delta}</div>
    `;
    grid.appendChild(el);
  });
}

function renderActions() {
  const wrap = document.getElementById("actions");
  const items = [
    { key: "home",   label: "All",     glyph: "≡",  filled: true  },
    { key: "pinned", label: "Pinned",  glyph: "★", filled: false },
    { key: "saved",  label: "Saved",   glyph: "🔖", filled: false },
    { key: "voices", label: "Voices",  glyph: "💬", filled: false },
  ];
  wrap.innerHTML = "";
  items.forEach(it => {
    const el = document.createElement("button");
    el.className = "action" + (it.filled ? "" : " outline") + (state.view === it.key ? " active" : "");
    el.innerHTML = `<div class="circle">${it.glyph}</div><div class="lbl">${it.label}</div>`;
    el.addEventListener("click", () => setView(it.key));
    wrap.appendChild(el);
  });
}

function renderVoices() {
  const wrap = document.getElementById("voices");
  wrap.innerHTML = "";
  VOICES.forEach(v => {
    const a = document.createElement("a");
    a.className = "voice";
    a.href = v.url;
    a.target = "_blank";
    a.rel = "noopener noreferrer";
    a.innerHTML = `
      <div class="voice-top">
        <div class="voice-avatar" style="background:${v.bg}">${v.initials}</div>
        <div class="voice-meta">
          <div class="voice-name">${v.name}</div>
          <div class="voice-role">${v.role}</div>
        </div>
      </div>
      <p class="voice-quote">${v.quote}</p>
      <div class="voice-source">${v.source} ↗</div>
    `;
    wrap.appendChild(a);
  });
}

function renderFeed() {
  const root = document.getElementById("feed");
  const empty = document.getElementById("empty");
  const titleEl = document.getElementById("feed-title");
  const metaEl = document.getElementById("feed-meta");
  root.innerHTML = "";

  // ---- Dedicated Voices view: list all voice cards full-width ----
  if (state.view === "voices") {
    titleEl.textContent = "All Voices";
    metaEl.textContent = `${VOICES.length} entries`;
    empty.style.display = "none";

    const card = document.createElement("div");
    card.className = "feed-card";
    card.innerHTML = `<div class="date-header"><span class="day">💬 Commentary</span></div>`;

    VOICES.forEach(v => {
      const a = document.createElement("a");
      a.href = v.url;
      a.target = "_blank";
      a.rel = "noopener noreferrer";
      a.className = "item";
      a.style.textDecoration = "none";
      a.style.color = "inherit";
      a.innerHTML = `
        <div class="item-icon" style="background:${v.bg}; font-size:14px; font-weight:700; color:var(--accent);">${v.initials}</div>
        <div class="item-body">
          <div class="item-title-row">
            <div class="item-title">${v.name}</div>
          </div>
          <div class="item-summary" style="font-style:italic; color:var(--text);">"${v.quote}"</div>
          <div class="item-meta">
            <span class="topic-tag">${v.role}</span>
            <span class="dot">·</span>
            <span>${v.source}</span>
          </div>
        </div>
        <div class="item-actions">
          <span class="a-btn" title="Open">↗</span>
        </div>
      `;
      card.appendChild(a);
    });
    root.appendChild(card);
    return;
  }

  let pool = NEWS.slice();

  if (state.view === "pinned") {
    pool = pool.filter(n => state.pinned.has(n.id));
    titleEl.textContent = "Pinned";
    metaEl.textContent = `${pool.length} pinned`;
  } else if (state.view === "saved") {
    pool = pool.filter(n => state.bookmarks.has(n.id));
    titleEl.textContent = "Saved for Later";
    metaEl.textContent = `${pool.length} saved`;
  } else {
    titleEl.textContent = state.topic ? state.topic : "Latest News";
    metaEl.textContent = state.topic ? "Filtered" : "All";
  }

  if (state.topic && state.view === "home") {
    pool = pool.filter(n => n.topic === state.topic);
  }

  pool.sort((a, b) => b.date.localeCompare(a.date));

  if (pool.length === 0) {
    empty.style.display = "block";
    document.getElementById("empty-msg").textContent =
      state.view === "pinned" ? "No pinned articles yet. Tap ★ on any story to pin it." :
      state.view === "saved"  ? "No saved articles yet. Tap 🔖 on any story to save it." :
      "No stories match this filter.";
    return;
  }
  empty.style.display = "none";

  // Pinned-at-top behavior on home view
  if (state.view === "home") {
    const pinnedItems = pool.filter(n => state.pinned.has(n.id));
    if (pinnedItems.length) {
      const card = document.createElement("div");
      card.className = "feed-card";
      card.innerHTML = `<div class="date-header"><span class="day">★ Pinned</span></div>`;
      pinnedItems.forEach(n => card.appendChild(renderItem(n)));
      root.appendChild(card);
      pool = pool.filter(n => !state.pinned.has(n.id));
    }
  }

  // Group remaining by date
  const groups = {};
  pool.forEach(n => {
    if (!groups[n.date]) groups[n.date] = [];
    groups[n.date].push(n);
  });
  const dates = Object.keys(groups).sort((a,b) => b.localeCompare(a));

  dates.forEach(d => {
    const card = document.createElement("div");
    card.className = "feed-card";
    card.innerHTML = `<div class="date-header"><span class="day">${shortDay(d)}</span>${fmtDate(d)}</div>`;
    groups[d].forEach(n => card.appendChild(renderItem(n)));
    root.appendChild(card);
  });
}

function renderItem(n) {
  const el = document.createElement("div");
  const isPinned = state.pinned.has(n.id);
  const isBooked = state.bookmarks.has(n.id);
  el.className = "item" + (isPinned ? " pinned" : "");
  const bg = TOPIC_BG[n.topic] || "var(--p-cream)";
  const ic = TOPIC_ICON[n.topic] || "📰";

  el.innerHTML = `
    <div class="item-icon" style="background:${bg}">${ic}</div>
    <div class="item-body">
      <div class="item-title-row">
        <div class="item-title"><a href="${n.url}" target="_blank" rel="noopener noreferrer">${n.title}</a></div>
        <span class="imp" title="${n.importance}">${IMP[n.importance] || ""}</span>
      </div>
      <div class="item-summary">${n.summary}</div>
      <div class="item-meta">
        <span class="topic-tag">${n.topic}</span>
        <span class="dot">·</span>
        <span>${n.source}</span>
      </div>
    </div>
    <div class="item-actions">
      <button class="a-btn pin ${isPinned ? "on" : ""}" title="Pin" data-id="${n.id}" data-act="pin">${isPinned ? "★" : "☆"}</button>
      <button class="a-btn ${isBooked ? "on" : ""}" title="Save for later" data-id="${n.id}" data-act="book">${isBooked ? "🔖" : "📑"}</button>
    </div>
  `;
  el.querySelectorAll(".a-btn").forEach(btn => {
    btn.addEventListener("click", (e) => {
      e.preventDefault();
      e.stopPropagation();
      const id = btn.getAttribute("data-id");
      const act = btn.getAttribute("data-act");
      if (act === "pin") togglePin(id);
      else toggleBook(id);
    });
  });
  return el;
}

function renderTabbar() {
  const wrap = document.getElementById("tabbar");
  const tabs = [
    { key: "home",    label: "Home",    icon: "⌂"  },
    { key: "pinned",  label: "Pinned",  icon: "★" },
    { key: "saved",   label: "Saved",   icon: "🔖" },
    { key: "voices",  label: "Voices",  icon: "💬" },
    { key: "about",   label: "About",   icon: "ⓘ"  },
  ];
  wrap.innerHTML = "";
  tabs.forEach(t => {
    const el = document.createElement("button");
    el.className = "tab" + (state.view === t.key ? " active" : "");
    el.innerHTML = `<span class="ti">${t.icon}</span><span class="tlbl">${t.label}</span>`;
    el.addEventListener("click", () => setView(t.key));
    wrap.appendChild(el);
  });
}

function renderTitle() {
  // Page header is always the brand name; section context lives in feed-title
  document.getElementById("page-title").textContent = "Finance Hub";
}

function setView(v) {
  if (v === "about") {
    alert("Finance Hub\n\nA daily-briefing finance news aggregator.\n\n• Pin (★) and Save (🔖) articles — stored on this device\n• Topic filters via the colored tiles\n• KPIs in the Economic Insight Center (manually updated)\n• Voices: latest commentary from finance leaders\n\nAll articles link to original sources.");
    return;
  }
  state.view = v;
  if (v !== "home") state.topic = null;
  renderAll();
  window.scrollTo({ top: 0, behavior: "smooth" });
}

function renderAll() {
  // Toggle strip-vs-full visibility for the Voices view
  const onVoices = state.view === "voices";
  document.getElementById("voices-head").style.display = onVoices ? "none" : "flex";
  document.getElementById("voices").style.display = onVoices ? "none" : "flex";

  renderTitle();
  renderShortcuts();
  renderKPIs();
  renderActions();
  renderVoices();
  renderFeed();
  renderTabbar();
}

renderAll();
</script>
